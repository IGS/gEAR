repos:
  - repo: local
    hooks:
      - id: cache-version-bump
        name: Bump cache_version
        entry: .githooks/pre-commit
        language: script
        stages: [commit]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.9
    hooks:
      - id: ruff
        args: [--show-fixes]
      - id: ruff-format
